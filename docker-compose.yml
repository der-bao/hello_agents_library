services:
  # 向量数据库服务 (用于 RAG 等语义搜索)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: hello-agents-qdrant
    ports:
      - "6333:6333" # HTTP API 端口
      - "6334:6334" # gRPC API 端口
    volumes:
      - ./memory_data/qdrant:/qdrant/storage # 持久化存储向量数据
    restart: unless-stopped
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - agent-network

  # 图数据库服务 (用于存储知识图谱和复杂实体关系)
  neo4j:
    image: neo4j:latest
    container_name: hello-agents-neo4j
    ports:
      - "7474:7474" # Neo4j Browser 浏览器管理界面
      - "7687:7687" # Bolt 协议程序连接端口
    volumes:
      - ./memory_data/neo4j/data:/data           # 数据库文件
      - ./memory_data/neo4j/logs:/logs           # 日志文件
      - ./memory_data/neo4j/import:/var/lib/neo4j/import # 数据导入目录
      - ./memory_data/neo4j/plugins:/plugins     # 插件目录 (如 APOC)
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-hello-agents-password} # 使用 .env 中的变量，若无则使用默认值
    restart: unless-stopped
    networks:
      - agent-network

# 自定义网络，使容器间可以通过 container_name 互相通信
networks:
  agent-network:
    driver: bridge
